<!DOCTYPE html>
<html>
<head>
    <title>AI Fake Job Detector</title>

    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            text-align: center;
        }

        .container {
            margin-top: 60px;
        }

        h1 {
            color: #2c3e50;
        }

        textarea {
            width: 60%;
            height: 200px;
            padding: 10px;
            border-radius: 10px;
            border: 2px solid #ccc;
            font-size: 16px;
        }

        button {
            margin-top: 15px;
            padding: 10px 25px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #219150;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🧠 AI Fake Job Detector</h1>

    <!-- 🔥 IMPORTANT: method POST + action /predict -->
    <form method="POST" action="/predict">

        <!-- 🔥 MUST MATCH Flask: request.form.get('text') -->
        <textarea name="text" placeholder="Paste job description here"></textarea>

        <br>

        <button type="submit">Check</button>
    </form>

    {% if prediction %}
    <div class="result">
        Result: {{ prediction }}
    </div>
    {% endif %}
</div>

</body>
</html>
